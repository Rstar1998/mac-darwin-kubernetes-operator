---
# ─── metal-proxy DaemonSet ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metal-proxy
  namespace: {{ .Values.namespace }}
  labels:
    app: metal-proxy
    apple.com/component: metal-proxy
spec:
  selector:
    matchLabels:
      app: metal-proxy
  template:
    metadata:
      labels:
        app: metal-proxy
    spec:
      serviceAccountName: metal-proxy
      hostNetwork: true
      hostPID: true
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: metal-proxy
          image: {{ .Values.metalProxy.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --socket-path=/var/run/metal-proxy/metal.sock
            - --max-queues={{ .Values.metalProxy.maxQueues }}
          securityContext:
            privileged: true
          volumeMounts:
            - name: proxy-socket
              mountPath: /var/run/metal-proxy
          livenessProbe:
            exec:
              command: ["/usr/local/bin/metal-health"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.metalProxy.resources | nindent 12 }}
      volumes:
        - name: proxy-socket
          hostPath:
            path: /var/run/metal-proxy
            type: DirectoryOrCreate

---
# ─── metal-device-plugin DaemonSet ───────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metal-device-plugin
  namespace: {{ .Values.namespace }}
  labels:
    app: metal-device-plugin
spec:
  selector:
    matchLabels:
      app: metal-device-plugin
  template:
    metadata:
      labels:
        app: metal-device-plugin
    spec:
      serviceAccountName: metal-device-plugin
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: device-plugin
          image: {{ .Values.devicePlugin.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --cores-per-slot={{ .Values.coresPerSlot }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CORES_PER_SLOT
              value: "{{ .Values.coresPerSlot }}"
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: proxy-socket
              mountPath: /var/run/metal-proxy
          resources:
            {{- toYaml .Values.devicePlugin.resources | nindent 12 }}
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: proxy-socket
          hostPath:
            path: /var/run/metal-proxy
            type: DirectoryOrCreate

---
# ─── metal-exporter DaemonSet ────────────────────────────────────────────────
{{- if .Values.exporter.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metal-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: metal-exporter
spec:
  selector:
    matchLabels:
      app: metal-exporter
  template:
    metadata:
      labels:
        app: metal-exporter
        prometheus-scrape: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.exporter.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: metal-exporter
      hostPID: true
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: exporter
          image: {{ .Values.exporter.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --listen-address=:{{ .Values.exporter.port }}
            - --scrape-interval={{ .Values.exporter.scrapeInterval }}
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: {{ .Values.exporter.port }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
          resources:
            {{- toYaml .Values.exporter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: metal-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: metal-exporter
spec:
  clusterIP: None
  selector:
    app: metal-exporter
  ports:
    - name: metrics
      port: {{ .Values.exporter.port }}
      targetPort: metrics
{{- end }}
