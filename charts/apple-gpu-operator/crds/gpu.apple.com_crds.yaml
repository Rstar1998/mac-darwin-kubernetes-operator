---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applegpuclusters.gpu.apple.com
  labels:
    app.kubernetes.io/managed-by: apple-gpu-operator
spec:
  group: gpu.apple.com
  names:
    kind: AppleGPUCluster
    listKind: AppleGPUClusterList
    plural: applegpuclusters
    singular: applegpucluster
    shortNames:
      - agc
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Ready Nodes
          type: integer
          jsonPath: ".status.readyNodes"
        - name: GPU Slots
          type: integer
          jsonPath: ".status.totalGPUSlots"
        - name: Allocated
          type: integer
          jsonPath: ".status.allocatedGPUSlots"
        - name: Age
          type: date
          jsonPath: ".metadata.creationTimestamp"
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: "AppleGPUCluster is the top-level cluster-scoped configuration resource for the Apple GPU Operator."
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: "AppleGPUClusterSpec defines the desired state."
              properties:
                coresPerSlot:
                  type: integer
                  format: int32
                  default: 10
                  minimum: 0
                  description: "Number of physical GPU cores that map to one apple.com/gpu slot. 0 = one slot for the entire GPU."
                metalProxyImage:
                  type: string
                  default: "ghcr.io/gpu-operator-mac/metal-proxy:latest"
                  description: "Container image for the metal-proxy DaemonSet."
                devicePluginImage:
                  type: string
                  default: "ghcr.io/gpu-operator-mac/metal-device-plugin:latest"
                  description: "Container image for the metal-device-plugin DaemonSet."
                exporterImage:
                  type: string
                  default: "ghcr.io/gpu-operator-mac/metal-exporter:latest"
                  description: "Container image for the metal-exporter DaemonSet."
                exporterEnabled:
                  type: boolean
                  default: true
                  description: "Whether to deploy the Prometheus exporter DaemonSet."
                schedulerExtenderEnabled:
                  type: boolean
                  default: true
                  description: "Whether to deploy the scheduler extender."
                schedulerExtenderImage:
                  type: string
                  default: "ghcr.io/gpu-operator-mac/metal-scheduler:latest"
                  description: "Container image for the scheduler extender."
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                  description: "Node selector for DaemonSet placement."
                imagePullPolicy:
                  type: string
                  default: "IfNotPresent"
                  enum: ["Always", "IfNotPresent", "Never"]
                  description: "Image pull policy for all operator-managed containers."
            status:
              type: object
              description: "AppleGPUClusterStatus reflects the observed state."
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required: ["type", "status"]
                totalNodes:
                  type: integer
                  format: int32
                readyNodes:
                  type: integer
                  format: int32
                totalGPUSlots:
                  type: integer
                  format: int64
                allocatedGPUSlots:
                  type: integer
                  format: int64
                observedGeneration:
                  type: integer
                  format: int64

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: metalworkloads.gpu.apple.com
  labels:
    app.kubernetes.io/managed-by: apple-gpu-operator
spec:
  group: gpu.apple.com
  names:
    kind: MetalWorkload
    listKind: MetalWorkloadList
    plural: metalworkloads
    singular: metalworkload
    shortNames:
      - mw
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Backend
          type: string
          jsonPath: ".spec.backend"
        - name: Slots
          type: integer
          jsonPath: ".spec.gpuSlots"
        - name: Priority
          type: string
          jsonPath: ".spec.priority"
        - name: Node
          type: string
          jsonPath: ".status.assignedNode"
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: "MetalWorkload carries per-workload GPU scheduling and backend hints."
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: "MetalWorkloadSpec defines scheduling and backend hints."
              properties:
                gpuSlots:
                  type: integer
                  format: int32
                  default: 1
                  minimum: 1
                  description: "Number of apple.com/gpu units this workload requests."
                backend:
                  type: string
                  default: "mlx"
                  enum: ["mlx", "pytorch-mps", "metal-compute"]
                  description: "Metal compute backend to use."
                priority:
                  type: string
                  default: "normal"
                  enum: ["high", "normal", "batch"]
                  description: "Job scheduling priority."
                thermalThrottlePolicy:
                  type: string
                  default: "pause"
                  enum: ["pause", "requeue", "continue"]
                  description: "Behaviour during thermal throttling."
                podSelector:
                  type: object
                  additionalProperties:
                    type: string
                  description: "Label selector matching the Pods this workload applies to."
            status:
              type: object
              description: "MetalWorkloadStatus reflects observed job state."
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required: ["type", "status"]
                observedGeneration:
                  type: integer
                  format: int64
                assignedNode:
                  type: string
                activeJobIDs:
                  type: array
                  items:
                    type: string
