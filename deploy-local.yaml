apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metal-device-plugin
  namespace: apple-gpu-system
spec:
  selector:
    matchLabels:
      app: metal-device-plugin
  template:
    metadata:
      labels:
        app: metal-device-plugin
    spec:
      serviceAccountName: metal-device-plugin
      nodeSelector:
        apple.com/chip-family: m-series
      containers:
        - name: device-plugin
          image: metal-device-plugin:local
          imagePullPolicy: Never
          args:
            - --cores-per-slot=10
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: proxy-socket
              mountPath: /var/run/metal-proxy
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: proxy-socket
          hostPath:
            path: /var/run/metal-proxy
